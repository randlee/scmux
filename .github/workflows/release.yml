name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_ext: tar.gz
            binary_ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            archive_ext: tar.gz
            binary_ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip
            binary_ext: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ matrix.target }}-release-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ matrix.target }}-release-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          ARCHIVE="scmux-${TAG}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/scmux${{ matrix.binary_ext }}" "dist/scmux${{ matrix.binary_ext }}"
          cp "target/${{ matrix.target }}/release/scmux-daemon${{ matrix.binary_ext }}" "dist/scmux-daemon${{ matrix.binary_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            cd dist && zip "../${ARCHIVE}" "scmux${{ matrix.binary_ext }}" "scmux-daemon${{ matrix.binary_ext }}" && cd ..
          else
            tar -czf "${ARCHIVE}" -C dist "scmux${{ matrix.binary_ext }}" "scmux-daemon${{ matrix.binary_ext }}"
          fi
          echo "ARCHIVE=${ARCHIVE}" >> "$GITHUB_ENV"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: scmux-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives and generate checksums
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts \( -name "*.tar.gz" -o -name "*.zip" \) -exec mv {} release/ \;
          cd release
          sha256sum * > checksums.txt
          echo "Release assets:"
          ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.tar.gz
            release/*.zip
            release/checksums.txt

  publish-crates:
    needs: [release]
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish scmux-daemon
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p scmux-daemon --locked

      - name: Wait for crates.io indexing
        run: sleep 60

      - name: Publish scmux
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p scmux --locked
