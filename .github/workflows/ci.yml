name: CI

on:
  pull_request:
    branches: [develop, main, "integrate/*"]
  push:
    branches: [develop, main]

jobs:
  fmt:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --check --all

  clippy:
    needs: [fmt]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dashboard artifact drift check
        shell: bash
        run: |
          set -euo pipefail
          cd dashboard
          npm install --no-package-lock --no-save @babel/core @babel/plugin-transform-react-jsx
          node <<'NODE'
          const babel = require('@babel/core');
          const fs = require('fs');
          const srcRaw = fs.readFileSync('team-dashboard.jsx', 'utf8');
          const importMatch = srcRaw.match(/^import\s+\{([^}]+)\}\s+from\s+["']react["'];?\s*\n/m);
          const reactImports = importMatch ? importMatch[1].trim().replace(/\s*,\s*/g, ', ') : 'useState';
          const src = srcRaw
            .replace(/^import\s+\{[^}]+\}\s+from\s+["']react["'];?\s*\n/m, '')
            .replace(/^export default function\s+/m, 'function ');
          const result = babel.transformSync(src, {
            plugins: ['@babel/plugin-transform-react-jsx'],
            filename: 'dashboard.jsx'
          });
          fs.writeFileSync(
            'dashboard.generated.js',
            `const { ${reactImports} } = React;\n\n` +
              result.code +
              '\n\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Dashboard));\n'
          );
          NODE
          diff --unified dashboard.js dashboard.generated.js
          diff --unified dashboard.js ../crates/scmux-daemon/assets/dashboard.js

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ubuntu-clippy-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ubuntu-clippy-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ubuntu-clippy-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: build (${{ matrix.os }})
    needs: [clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-build-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-build-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-build-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Build workspace
        run: cargo build --verbose

      - name: Build release daemon (NF-01)
        run: cargo build --release -p scmux-daemon

      - name: NF-01 dynamic dependency check
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/release/scmux-daemon"
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            ldd "$BIN"
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            otool -L "$BIN"
          else
            echo "Skipping dependency check for unsupported runner OS"
          fi

      - name: Run tests
        run: cargo test --verbose

  perf-gate:
    name: perf-gate (release benchmarks)
    needs: [clippy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run T-D-22 in release mode
        run: cargo test --release -p scmux-daemon td_22_poll_cycle_latency_under_500ms_for_50_sessions -- --exact --ignored

      - name: Run T-D-23 in release mode
        run: cargo test --release -p scmux-daemon td_23_get_sessions_latency_under_100ms_at_50_sessions -- --exact --ignored
